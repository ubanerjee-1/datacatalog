# BHE Catalog Explorer — Genie Space
#
# Promotion path for the Genie space that backs the in-app chatbot's
# `genie_ask` fallback tool.
#
# ============================================================================
# RECOMMENDED: deploy from the in-app Setup Wizard, not via this bundle file
# ============================================================================
#
# The Genie space references tables in <catalog>.bhe_silver and
# <catalog>.bhe_gold, so it cannot be created until those tables exist.
# `databricks bundle deploy` runs before the Setup Wizard provisions schemas
# and tables, which means this resource has nothing valid to point at.
#
# Instead: open the deployed app, walk the Setup Wizard steps in order, and
# when you reach "Step 4: Deploy Genie Space" the wizard will:
#   1. Read the canonical JSON below
#   2. Substitute your actual catalog (and silver/gold schema names) for the
#      `your_catalog.*` placeholders
#   3. Call POST /api/2.0/genie/spaces (or PATCH on re-sync)
#   4. Persist the returned space_id to <catalog>.bhe_gold.app_config so the
#      chatbot picks it up at runtime without an app restart
#
# That flow is implemented in:
#   - src/app/src/bhe_catalog/backend/setup_genie.py  (helper)
#   - src/app/src/bhe_catalog/backend/router.py       (POST /api/setup/deploy-genie-space)
#   - src/app/src/bhe_catalog/ui/routes/_sidebar/company.tsx  (Step 4 card)
#
# ============================================================================
# OPTIONAL: deploy via this bundle resource
# ============================================================================
#
# Only attempt this if the silver+gold tables already exist in the target
# workspace AND your CLI is recent enough. Two requirements apply:
#
#   1. Databricks CLI v0.287.0 or later (older versions silently skip the
#      genie_spaces resource without warning):
#        brew upgrade databricks
#
#   2. Bundle direct-deploy engine (NOT the default Terraform engine):
#        DATABRICKS_BUNDLE_ENGINE=direct databricks bundle deploy -t <target>
#
# If you take this path, you'll still want to write the resulting space_id
# into bhe_gold.app_config (key='genie_space_id') so the chatbot resolves it
# at runtime — easiest is to run the Setup Wizard's "Re-sync" button, which
# is idempotent and writes app_config as a side effect.
#
# ============================================================================
# SOURCE OF TRUTH
# ============================================================================
#
# The space content (tables, instructions, example questions) lives in
# resources/genie_spaces/bhe_catalog_explorer.json. That file is referenced by:
#   - this DAB resource (via ${file(...)} interpolation)
#   - src/app/create_genie_space.py (the standalone CLI bootstrap script)
#   - src/app/src/bhe_catalog/_genie_space_template.json (an in-app copy that
#     ships with the deployed Databricks App for the in-app deploy path)
#
# When editing the JSON, keep the `_genie_space_template.json` copy in sync
# (scripts/deploy.py asserts equality before pushing).
#
# ============================================================================

resources:
  genie_spaces:
    bhe_catalog_explorer:
      title: "BHE Catalog Explorer"
      description: >-
        Natural-language exploration of the BHE Data Catalog. Covers Unity
        Catalog inventory (schemas, tables), business use cases, affiliates,
        source systems, and cross-environment consistency. Backing store for
        the in-app chatbot's fallback data-query tool.
      warehouse_id: ${var.warehouse_id}
      # parent_path defaults to workspace.resource_path if omitted.
      # serialized_space is loaded from the canonical JSON file so the same
      # content is used by the Python bootstrap and by this bundle.
      serialized_space: ${file('genie_spaces/bhe_catalog_explorer.json')}

      permissions:
        - group_name: "account users"
          level: CAN_RUN
