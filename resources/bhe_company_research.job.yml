resources:
  jobs:
    bhe_company_research:
      name: "[${bundle.target}] BHE Company Research"
      max_concurrent_runs: 1
      tasks:
        - task_key: "research_company"
          spark_python_task:
            python_file: ../src/jobs/company_research.py
            parameters:
              - "--catalog"
              - "${var.catalog}"
              - "--silver-schema"
              - "bhe_silver"
              - "--model-endpoint"
              - "databricks-claude-sonnet-4"
          environment_key: "default"
      environments:
        - environment_key: "default"
          spec:
            client: "2"
            dependencies:
              - "databricks-sdk>=0.20.0"
              - "databricks-sql-connector>=3.0.0"
      # The user running `databricks bundle deploy` is granted CAN_MANAGE
      # automatically. Add an explicit `permissions:` block here if you need
      # to share ownership with another user/group.
