bundle:
  name: bhe-data-catalog

include:
  - resources/*.yml

sync:
  include:
    # Customer-editable seed CSVs (affiliates, source-system canonicals etc).
    - src/data/**
    # Vite build output. We keep `__dist__/` gitignored because it's
    # generated by `npx vite build` (or scripts/deploy.py), but the bundle
    # MUST upload it -- the FastAPI backend mounts it as the SPA root via
    # StaticFiles. Without this include, the deployed app responds with
    # `{"detail":"Not Found"}` at `/` and only the API endpoints work.
    - src/app/src/bhe_catalog/__dist__/**

# =============================================================================
# Bundle variables
#
# These drive the bundle-managed resources (jobs, pipelines, the App's SQL
# warehouse binding). The app's *runtime* catalog/warehouse env vars are set
# in `src/app/app.yml`. `scripts/deploy.py` keeps the two in sync and is the
# recommended path for new deployments — it prompts for these values, rewrites
# both files, deploys the bundle, then GRANTs UC permissions to the app's
# service principal.
#
# To deploy manually: edit the defaults below + `src/app/app.yml`, then run
#   databricks bundle deploy -t dev --var catalog=<x> --var warehouse_id=<y>
#   databricks bundle run bhe_catalog_app -t dev
# =============================================================================
variables:
  catalog:
    description: "Unity Catalog that jobs/pipelines write to. Must match BHE_CATALOG in src/app/app.yml."
    default: "your_catalog"
  warehouse_id:
    description: "SQL warehouse ID the app and bundled jobs run against. Must match DATABRICKS_WAREHOUSE_ID in src/app/app.yml."
    default: "your-warehouse-id"

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://your-workspace.cloud.databricks.com
      profile: your-cli-profile
    variables:
      catalog: "your_catalog"

  prod:
    mode: production
    workspace:
      host: https://your-workspace.cloud.databricks.com
      profile: your-cli-profile
    variables:
      catalog: "your_catalog"
